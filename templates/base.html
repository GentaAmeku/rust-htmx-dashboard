<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskBoard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/public/style.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.11"></script>
</head>
<body class="min-h-screen bg-base-200">

<div class="flex h-screen">
    <!-- Sidebar -->
    <aside class="w-60 bg-base-100 shadow-sm flex flex-col">
        <!-- Logo -->
        <div class="flex items-center gap-2 px-5 py-5">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
            <span class="text-lg font-bold">TaskBoard</span>
        </div>

        <!-- Menu Label -->
        <div class="px-5 pt-4 pb-2">
            <span class="text-xs font-semibold uppercase tracking-wider text-base-content/50">Menu</span>
        </div>

        <!-- Navigation -->
        <ul class="menu px-3 gap-1">
            <li>
                <a href="/" class="{% if active_page == "dashboard" %}active{% endif %} flex items-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                    Dashboard
                </a>
            </li>
            <li>
                <a href="/tasks" class="{% if active_page == "tasks" %}active{% endif %} flex items-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m9 12 2 2 4-4"/></svg>
                    Tasks
                </a>
            </li>
        </ul>
    </aside>

    <!-- Main Area -->
    <main class="flex-1 overflow-y-auto bg-base-200">
        <!-- Header -->
        <div class="flex items-center justify-between px-8 py-5">
            <div>
                <h1 class="text-2xl font-bold">{% block page_title %}{% endblock %}</h1>
                <p class="text-sm text-subtitle">{% block page_subtitle %}{% endblock %}</p>
            </div>
            <div class="flex items-center gap-3">
                {% block header_action %}{% endblock %}
            </div>
        </div>

        <!-- Content -->
        <div class="px-8 pb-8">
            {% block content %}{% endblock %}
        </div>
    </main>
</div>

</body>
</html>
